<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form
      style="
        max-width: 300px;
        border: 2px solid #1e0dff;
        background-color: royalblue;
      "
      action=""
      id="myform"
    >
      <div style="width: 250px; text-align: center; margin: auto; color: white">
        <p
          style="
            font-size: 30px;
            text-align: center;
            background-color: #1e0dff;
            color: white;
          "
        >
          STUDENT GRADE EVALUATION
        </p>
        <label style="font-size: 20px" for="">Enter Math 101 score</label>
        <br />
        <input
          style="
            width: 200px;
            height: 25px;
            margin-bottom: 20px;
            border: 3px solid blue;
            font-size: 20px;
          "
          type="text"
          placeholder="Enter score1 here"
          id="score1"
        />
        <br />
        <label style="font-size: 20px" for="">Enter Math 201 score</label>
        <br />
        <input
          style="
            width: 200px;
            height: 25px;
            margin-bottom: 20px;
            border: 3px solid blue;
            font-size: 20px;
          "
          type="text"
          placeholder="Enter score2 here"
          id="score2"
        />
        <br />
        <label style="font-size: 20px" for="">Enter Math 301 score</label>
        <br />
        <input
          style="
            width: 200px;
            height: 25px;
            margin-bottom: 20px;
            border: 3px solid blue;
            font-size: 20px;
          "
          type="text"
          placeholder="Enter score3 here"
          id="score3"
        />
        <br />
        <label style="font-size: 20px" for="">Enter Math 401 score</label>
        <br />
        <input
          style="
            width: 200px;
            height: 25px;
            margin-bottom: 20px;
            border: 3px solid blue;
            font-size: 20px;
          "
          type="text"
          placeholder="Enter score4 here"
          id="score4"
        />
        <br />
        <label style="font-size: 20px" for="">Enter Math 501 score</label>
        <br />
        <input
          style="
            width: 200px;
            height: 25px;
            margin-bottom: 20px;
            border: 3px solid blue;
            font-size: 20px;
          "
          type="text"
          placeholder="Enter score5 here"
          id="score5"
        />
        <br />
        <input
          style="
            padding: 10px;
            background-color: green;
            color: white;
            font-size: 15px;
          "
          type="submit"
        />
      </div>
      <p
        style="background-color: white; padding: 15px; font-size: 20px"
        id="result"
      ></p>
      <p
        style="padding: 15px; background-color: white; font-size: 20px"
        id="grade"
      ></p>
    </form>
    <script src="sge.js"></script>
  </body>
</html>
